<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeTour</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" integrity="sha384-wFjoQjtV1y5jVHbt0p35Ui8aV8GVpEZkyF99OXWqP/eNJDU93D3Ugxkoyh6Y2I4A" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" integrity="sha384-nUkTNLI8COlMCRJ0FHIdX76If83145OTCLUx4gQyfnO0gGeO/sD9czGEUBxtkcUv" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-highlight/prism-line-highlight.min.css" integrity="sha384-bCq+nBO5hUxeJTxGcpLbGAP5hqUhRUl9xclGVWMifyWonUxPS1+fO1JzOplEJsLP" crossorigin="anonymous">
</head>
<body>
  <header id="tour-header">
    <div class="header-left">
      <select id="tour-select"></select>
      <span id="tour-title" hidden></span>
      <span id="step-counter"></span>
    </div>
    <div class="header-right">
      <button id="notes-btn" title="Show step notes (n)">notes</button>
      <button id="prev-btn" title="Previous step (Left arrow)">&#9664; prev</button>
      <button id="next-btn" title="Next step (Right arrow)">next &#9654;</button>
    </div>
  </header>

  <main id="app">
    <section id="code-panel">
      <div id="file-header"></div>
      <div id="code-container">
        <pre id="code-pre" class="line-numbers"><code id="code-block"></code></pre>
      </div>
      <div id="step-popover" class="step-popover" hidden>
        <div class="popover-header">
          <span id="popover-step-label"></span>
          <button id="popover-close" title="Close (Escape)">&times;</button>
        </div>
        <div id="step-description"></div>
      </div>
    </section>

    <div id="panel-resize-handle"></div>
    <section id="side-panel">
      <div id="chat-panel">
        <div id="chat-header">
          <div>
            <h3>Chat</h3>
            <span id="session-name" style="font-size: 11px; color: var(--text-dim);"></span>
          </div>
          <button id="chat-reset" title="Clear chat history">Reset</button>
        </div>
        <div id="chat-messages">
          <div id="typing-indicator" class="typing-indicator" hidden>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
        <div id="chat-input-area">
          <textarea id="chat-input" placeholder="Ask about this code..." rows="1" autocomplete="off"></textarea>
          <button id="chat-send" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="loading">Loading tour...</div>
  <div id="error" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" integrity="sha384-06z5D//U/xpvxZHuUz92xBvq3DqBBFi7Up53HRrbV7Jlv7Yvh/MZ7oenfUe9iCEt" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js" integrity="sha384-6QJu8apxMmB9TiPVWzYKF5pRgKcz7snO0/QU+MrWmgBLECQjoa6erxX2VQ5t41Jd" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-highlight/prism-line-highlight.min.js" integrity="sha384-aA5pbfEm+kZPOE/CKuBywvgtAzs4ZrQPlTwexPyFEwQ96E9rTPN1B0ObNmCn9tgH" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js" integrity="sha384-Uq05+JLko69eOiPr39ta9bh7kld5PKZoU+fF7g0EXTAriEollhZ+DrN8Q/Oi8J2Q" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha384-3zf4Pen4fXU90jGg3cxmo7BF4dq8HMtF2s07c/Hhd1Fh+Encm6ApPvNm8vrMJbWu" crossorigin="anonymous"></script>
  <script src="/static/app.js"></script>
</body>
</html>
